<!DOCTYPE html>
<html>
<head>
<title>AlertX Disaster Rescue System</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
background:#e53935;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#c62828;
}

.sos{
background:red;
font-size:20px;
padding:15px;
width:100%;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f1f1f1;
margin-top:10px;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<header>
🚨 AlertX Disaster Rescue System
</header>

<div class="container">

<div class="card">

<h2>Report Disaster</h2>

<label>Disaster Type</label>

<select id="disasterType">
<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Landslide</option>
<option>Fire</option>
</select>

<label>Location</label>

<input type="text" id="location" placeholder="Enter location">

<button onclick="submitReport()">Submit Report</button>

</div>

<div class="card">

<h2>🚨 Emergency SOS</h2>

<button class="sos" onclick="sendSOS()">SEND SOS ALERT</button>

</div>

<div class="card">

<h2>Saved Disaster Reports (Database)</h2>

<ul id="reportList"></ul>

</div>

</div>

<script>

let disasterDatabase=[]

function submitReport(){

let disaster=document.getElementById("disasterType").value
let location=document.getElementById("location").value

let report={
type:disaster,
place:location,
time:new Date().toLocaleString()
}

disasterDatabase.push(report)

displayReports()

}

function displayReports(){

let list=document.getElementById("reportList")

list.innerHTML=""

disasterDatabase.forEach(function(data){

let item=document.createElement("li")

item.innerHTML=
"<b>"+data.type+"</b> reported at <b>"+data.place+
"</b><br>Time: "+data.time

list.appendChild(item)

})

}

function sendSOS(){

alert("🚨 SOS ALERT SENT\nLocation shared with rescue teams.")

}

</script>

</body>
</html>
